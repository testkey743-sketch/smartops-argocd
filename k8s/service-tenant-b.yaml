apiVersion: v1
kind: Service
metadata:
  name: tenant-b-service
  namespace: tenant-b
  labels:
    tenant: tenant-b
    environment: production
spec:
  selector:
    app: tenant-b-app
    tenant: tenant-b
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
